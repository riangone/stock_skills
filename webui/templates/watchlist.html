{% extends "base.html" %}

{% block content %}
<div class="breadcrumbs">
    <ul>
        <li><a href="/">ホーム</a></li>
        <li>ウォッチリスト</li>
    </ul>
</div>

<h1 class="page-title">ウォッチリスト</h1>

<div class="wl-layout">

    <!-- ── Sidebar ─────────────────────────────────────────── -->
    <aside class="wl-sidebar">

        <!-- Create list -->
        <div class="card" style="margin-bottom:1rem;">
            <div class="card-body">
                <div class="card-title">リスト管理</div>
                <form onsubmit="createList(event)">
                    <div class="form-control">
                        <label class="label"><span class="label-text">新規リスト名</span></label>
                        <div class="join">
                            <input type="text" id="list-name" class="input join-item" style="flex:1;" placeholder="例: 注目銘柄" required />
                            <button type="submit" class="btn btn-primary join-item">作成</button>
                        </div>
                    </div>
                </form>

                <div class="divider">既存リスト</div>

                <div id="list-selector" style="display:flex; flex-direction:column; gap:0.375rem;">
                    <div style="text-align:center; padding:1rem;">
                        <div class="loading loading-spinner"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Add tickers -->
        <div class="card" style="margin-bottom:1rem;">
            <div class="card-body">
                <div class="card-title">銘柄追加</div>
                <form onsubmit="addTickers(event)">
                    <div class="form-control">
                        <label class="label"><span class="label-text">追加先リスト</span></label>
                        <select id="add-list-select" class="select" required>
                            <option value="">リストを選択</option>
                        </select>
                    </div>
                    <div class="form-control">
                        <label class="label"><span class="label-text">ティッカー (カンマ区切り)</span></label>
                        <input type="text" id="add-tickers" class="input" placeholder="7203.T, AAPL" required />
                        <span class="label-text-alt">複数はカンマで区切り</span>
                    </div>
                    <button type="submit" class="btn btn-success btn-block" style="margin-top:0.25rem;">追加</button>
                </form>
            </div>
        </div>

        <!-- Danger zone -->
        <div class="card">
            <div class="card-body">
                <div class="card-title" style="color:var(--c-negative);">リスト削除</div>
                <p style="font-size:var(--text-xs); color:var(--c-text-muted); margin-bottom:0.75rem;">選択中のリストを削除します</p>
                <button class="btn btn-error btn-sm btn-block" onclick="deleteCurrentList()" id="delete-list-btn" disabled>
                    リストを削除
                </button>
            </div>
        </div>
    </aside>

    <!-- ── Main ────────────────────────────────────────────── -->
    <main class="wl-main">
        <div class="card" style="height:100%;">
            <div class="card-body">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.25rem;">
                    <div class="card-title" style="margin-bottom:0;" id="current-list-title">銘柄一覧</div>
                    <span class="badge badge-secondary" id="ticker-count">0 銘柄</span>
                </div>

                <div id="tickers-loading" style="text-align:center; padding:2.5rem 0;">
                    <div class="loading loading-spinner"></div>
                </div>

                <div id="tickers-content" style="display:none;">
                    <div class="overflow-x-auto">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th style="width:2rem;">
                                        <input type="checkbox" id="select-all" class="checkbox" onchange="toggleSelectAll()" />
                                    </th>
                                    <th>ティッカー</th>
                                    <th>追加日</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody id="tickers-body"></tbody>
                        </table>
                    </div>
                    <div style="display:flex; gap:0.5rem; flex-wrap:wrap; margin-top:1rem;">
                        <button class="btn btn-sm btn-error"    onclick="removeSelected()">選択して削除</button>
                        <button class="btn btn-sm btn-outline"  onclick="analyzeSelected()">選択して分析</button>
                    </div>
                </div>

                <div id="no-tickers" style="display:none; text-align:center; padding:2.5rem 0; color:var(--c-text-muted);">
                    <p>このリストには銘柄がありません。</p>
                    <p style="font-size:var(--text-xs); margin-top:0.375rem;">左のフォームから追加できます。</p>
                </div>

                <div id="no-list-selected" style="text-align:center; padding:2.5rem 0; color:var(--c-text-dim);">
                    <p>リストを選択してください。</p>
                </div>
            </div>
        </div>
    </main>
</div>
{% endblock %}

{% block scripts %}
<script>
let currentList = null;
let watchlists = {};

document.addEventListener('DOMContentLoaded', loadWatchlists);

async function loadWatchlists() {
    try {
        const r = await fetch('/api/watchlist',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'list'})});
        const data = await r.json();
        if (data.success) {
            watchlists = data.watchlists || {};
            renderListSelector();
            renderAddListSelector();
            if (currentList && watchlists[currentList]) loadList(currentList);
        }
    } catch(e) { console.error(e); }
}

function renderListSelector() {
    const el = document.getElementById('list-selector');
    const keys = Object.keys(watchlists);
    if (!keys.length) {
        el.innerHTML = '<p style="text-align:center; color:var(--c-text-dim); font-size:var(--text-xs);">リストがありません</p>';
        return;
    }
    el.innerHTML = keys.map(name => `
        <button
            class="wl-list-item ${currentList===name?'wl-list-item-active':''}"
            onclick="loadList('${name.replace(/'/g,"\\'")}')">
            <span>${name}</span>
            <span class="badge badge-sm badge-secondary">${watchlists[name].length}</span>
        </button>
    `).join('');
}

function renderAddListSelector() {
    const sel = document.getElementById('add-list-select');
    sel.innerHTML = '<option value="">リストを選択</option>' +
        Object.keys(watchlists).map(n=>`<option value="${n}"${n===currentList?' selected':''}>${n}</option>`).join('');
}

async function createList(e) {
    e.preventDefault();
    const name = document.getElementById('list-name').value.trim();
    if (!name) return;
    try {
        const r = await fetch('/api/watchlist',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'add',list_name:name,tickers:[]})});
        const data = await r.json();
        if (data.success) { document.getElementById('list-name').value=''; loadWatchlists(); }
        else alert('エラー: リストの作成に失敗しました');
    } catch(err) { alert('エラー: '+err.message); }
}

async function loadList(name) {
    currentList = name;
    document.getElementById('current-list-title').textContent = name;
    document.getElementById('delete-list-btn').disabled = false;
    document.getElementById('no-list-selected').style.display = 'none';
    document.getElementById('tickers-loading').style.display = 'block';
    document.getElementById('tickers-content').style.display = 'none';
    document.getElementById('no-tickers').style.display = 'none';
    try {
        const r = await fetch('/api/watchlist',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'show',list_name:name})});
        const data = await r.json();
        document.getElementById('tickers-loading').style.display = 'none';
        if (data.success && data.tickers && data.tickers.length) {
            document.getElementById('tickers-content').style.display = '';
            document.getElementById('ticker-count').textContent = data.tickers.length + ' 銘柄';
            renderTickers(data.tickers);
        } else {
            document.getElementById('no-tickers').style.display = '';
            document.getElementById('ticker-count').textContent = '0 銘柄';
        }
    } catch(err) {
        document.getElementById('tickers-loading').style.display = 'none';
        alert('エラー: '+err.message);
    }
    renderListSelector();
}

function renderTickers(tickers) {
    document.getElementById('tickers-body').innerHTML = tickers.map(t => `
        <tr>
            <td><input type="checkbox" class="ticker-checkbox checkbox" value="${t}" /></td>
            <td style="font-weight:600;"><a href="/report?ticker=${t}" class="link link-primary">${t}</a></td>
            <td style="color:var(--c-text-dim);">—</td>
            <td>
                <div style="display:flex; gap:0.25rem;">
                    <a href="/report?ticker=${t}" class="btn btn-sm btn-outline">分析</a>
                    <button class="btn btn-sm btn-ghost" style="color:var(--c-negative);" onclick="removeTicker('${t}')">削除</button>
                </div>
            </td>
        </tr>
    `).join('');
    document.getElementById('select-all').checked = false;
}

async function addTickers(e) {
    e.preventDefault();
    const name = document.getElementById('add-list-select').value;
    const raw  = document.getElementById('add-tickers').value;
    if (!name || !raw.trim()) { alert('リストとティッカーを入力してください'); return; }
    const tickers = raw.split(',').map(s=>s.trim()).filter(Boolean);
    if (!tickers.length) { alert('有効なティッカーを入力してください'); return; }
    try {
        const r = await fetch('/api/watchlist',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'add',list_name:name,tickers})});
        const data = await r.json();
        if (data.success) { document.getElementById('add-tickers').value=''; loadWatchlists(); if(currentList===name) loadList(name); }
        else alert('エラー: '+JSON.stringify(data));
    } catch(err) { alert('エラー: '+err.message); }
}

async function removeTicker(t) {
    if (!currentList || !confirm(`「${t}」を削除しますか？`)) return;
    try {
        const r = await fetch('/api/watchlist',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'remove',list_name:currentList,tickers:[t]})});
        const data = await r.json();
        if (data.success) { loadWatchlists(); loadList(currentList); }
        else alert('エラー: '+JSON.stringify(data));
    } catch(err) { alert('エラー: '+err.message); }
}

function toggleSelectAll() {
    const v = document.getElementById('select-all').checked;
    document.querySelectorAll('.ticker-checkbox').forEach(c => c.checked = v);
}

function getSelected() {
    return [...document.querySelectorAll('.ticker-checkbox:checked')].map(c=>c.value);
}

async function removeSelected() {
    if (!currentList) return;
    const tickers = getSelected();
    if (!tickers.length) { alert('削除する銘柄を選択してください'); return; }
    if (!confirm(`${tickers.length}銘柄を削除しますか？`)) return;
    try {
        const r = await fetch('/api/watchlist',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'remove',list_name:currentList,tickers})});
        const data = await r.json();
        if (data.success) { loadWatchlists(); loadList(currentList); }
        else alert('エラー: '+JSON.stringify(data));
    } catch(err) { alert('エラー: '+err.message); }
}

function analyzeSelected() {
    const t = getSelected();
    if (!t.length) { alert('分析する銘柄を選択してください'); return; }
    window.open('/report?ticker='+t[0], '_blank');
}

async function deleteCurrentList() {
    if (!currentList || !confirm(`リスト「${currentList}」を削除しますか？`)) return;
    const name = currentList;
    try {
        const r = await fetch('/api/watchlist',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'delete_list',list_name:name})});
        const data = await r.json();
        if (data.success) {
            currentList = null;
            document.getElementById('current-list-title').textContent = '銘柄一覧';
            document.getElementById('delete-list-btn').disabled = true;
            document.getElementById('tickers-content').style.display = 'none';
            document.getElementById('no-list-selected').style.display = '';
            loadWatchlists();
        } else alert('エラー: '+JSON.stringify(data));
    } catch(err) { alert('エラー: '+err.message); }
}
</script>
{% endblock %}
